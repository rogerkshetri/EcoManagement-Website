<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoManagement - Saving Goals</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #56c986;
            --bg-color: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --font-main: 'Noto Sans Georgian', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: var(--font-main);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
        }

        h2, .heading-2 {
            font-size: 28px;
            font-weight: 700;
        }

        p, span, a, div {
            font-size: 16px;
            font-weight: 400;
        }

        /* ---- HEADER & NAV ---- */
        header {
            background: white;
            height: 90px;
            padding: 0 8% 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-img {
            height: 100%;
            width: auto;
            background-color: white;
            padding: 10px 20px;
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.05);
        }

        nav {
            display: flex;
            gap: 50px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 20px;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: var(--primary-green);
        }

        /* ---- MAIN CONTENT ---- */
        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero-title-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .quotes {
            font-size: 24px;
            color: black;
        }

        .pig-icon {
            width: 50px;
            height: auto;
        }

        .main-container {
            max-width: 1440px;
            margin: 0 auto 80px;
            background: white;
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.06);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }

        /* Ẩn checkbox mặc định */
        .card-checkbox {
            display: none;
        }

        .card {
            border: 2px solid var(--border-color);
            border-radius: 18px;
            padding: 25px;
            display: flex;
            gap: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        /* Khi checkbox được chọn, CSS sẽ tự động đổi màu thẻ card mà không cần JS */
        .card-checkbox:checked + .card {
            border-color: var(--primary-green);
            background-color: #f0fdf4;
        }

        .check-circle {
            width: 26px;
            height: 26px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-checkbox:checked + .card .check-circle {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        .card-checkbox:checked + .card .check-circle::after {
            content: '✓';
            color: white;
            font-size: 16px;
        }

        .card-info b {
            display: block;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .card-info span {
            color: var(--primary-green);
            font-weight: 700;
            font-size: 18px;
        }

        .summary-bar {
            background-color: var(--primary-green);
            color: black;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }

        .summary-bar h2 {
            font-size: 36px;
        }

        footer {
            padding: 40px 8%;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }

        footer a {
            text-decoration: none;
            color: inherit;
            margin-left: 25px;
        }

        /* ---- RESPONSIVE MOBILE ---- */
        @media (max-width: 900px) { 
            .grid { grid-template-columns: 1fr 1fr; } 
        }
        
        @media (max-width: 768px) {
            header {
                height: auto;
                padding: 0 0 15px 0;
                flex-direction: column;
                gap: 20px;
            }
            .logo-img {
                height: 80px;
                box-shadow: none;
                border-bottom: 1px solid var(--border-color);
            }
            nav {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>

    <footer>
        <div class="body-text">Copyright 2026 - EcoManagement</div>
        <div class="footer-links">

</body>
</html>
